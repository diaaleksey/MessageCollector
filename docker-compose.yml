services:
  mc-database:
    image: postgres:18-alpine
    container_name: mc-database
    hostname: mc-database
    environment:
      - DB_HOST=mc-database
      - DB_PORT=5432
      - DB_DB=mc
      - DB_USER=mc_user
      - DB_PASSWORD=test123
      - POSTGRES_HOST_AUTH_METHOD=trust
    env_file:
      - .env
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - mc-database-data:/var/lib/postgresql/18/docker
      - ./db/initdb:/docker-entrypoint-initdb.d
    networks:
      - mc-network

  mc-collector:
    build: ./collector
    image: collector/collector:1.0.0
    container_name: mc-collector
    depends_on:
        mc-database:
            condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://mc_user:test123@mc-database:5432/mc
      - TG_API_ID=${TG_API_ID}
      - TG_API_HASH=${TG_API_HASH}
      - TG_PHONE_NUMBER=${TG_PHONE_NUMBER}
    volumes:
      - ./chats.json:/app/chats.json:ro
      - ./media:/app/media
      - ./logs:/app/logs
      - ./sessions:/app/sessions
#    restart: unless-stopped
    networks:
      - mc-network

  mc-api:
    build: ./api
    image: collector/api:1.0.0
    container_name: mc-api
    ports:
      - "8100:8000"
    depends_on:
      mc-database:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://mc_user:test123@mc-database:5432/mc
      - API_KEY=${API_KEY}
#    restart: unless-stopped
    networks:
      - mc-network
volumes:
  mc-database-data:

networks:
  mc-network:
    driver: bridge